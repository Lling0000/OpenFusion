name: Bug report
description: Report a reproducible OpenFusion issue.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, config snippets without secrets, and expected vs actual behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Node:
        - OpenFusion version/commit:
        - Upstream relay:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or trace
      description: Paste relevant output from `node src/cli.js doctor` or `/debug/route`. Remove secrets.
      render: shell
